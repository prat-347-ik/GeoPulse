services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - MONGO_DB_NAME=geopulse
      - MOCK_DATA_PATH=/mock_data/mock_data.json
      - MOCK_VALIDATIONS_PATH=/mock_data/mock_validations.json
    volumes:
      - ./backend:/app
      - ./mock_data:/mock_data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data: